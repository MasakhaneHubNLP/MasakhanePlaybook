<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-label="Sample blog post thumbnail">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f6c4a"/>
      <stop offset="55%" stop-color="#1aa674"/>
      <stop offset="100%" stop-color="#f7c948"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.8" cy="0.2" r="0.7">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#glow)"/>

  <g fill="#ffffff" fill-opacity="0.08">
    <circle cx="180" cy="540" r="160"/>
    <circle cx="1040" cy="140" r="220"/>
    <circle cx="900" cy="600" r="90"/>
  </g>

  <g font-family="Inter, system-ui, sans-serif" fill="#ffffff">
    <text x="80" y="200" font-size="36" font-weight="500" opacity="0.85">Masakhane Playbook</text>
    <text x="80" y="320" font-size="84" font-weight="800">Sample Post</text>
    <text x="80" y="380" font-size="84" font-weight="800">Thumbnail</text>
    <text x="80" y="500" font-size="28" opacity="0.85">Replace this image with your own in static/img/blog/</text>
  </g>
</svg>
