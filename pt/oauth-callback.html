<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Authenticating with GitHub…</title>
  <style>
    body { font-family: system-ui, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #f6f8fa; color: #24292f; }
    .box { text-align: center; padding: 2rem; }
    .spinner { width: 32px; height: 32px; border: 3px solid #d0d7de; border-top-color: #0969da; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 1rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { margin: 0.5rem 0; color: #57606a; font-size: 0.95rem; }
  </style>
</head>
<body>
  <div class="box">
    <div class="spinner"></div>
    <p>Completing GitHub login…</p>
    <p id="msg" style="font-size:0.8rem"></p>
  </div>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var code  = params.get('code');
      var error = params.get('error');
      var errorDesc = params.get('error_description');

      if (window.opener && !window.opener.closed) {
        window.opener.postMessage(
          { type: 'github-oauth-callback', code: code, error: error, errorDesc: errorDesc },
          window.location.origin
        );
        window.close();
      } else {
        // Opened directly (no opener), show message
        document.getElementById('msg').textContent =
          error ? ('Error: ' + (errorDesc || error)) : 'Return to the previous tab to continue.';
      }
    })();
  </script>
</body>
</html>
